<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIBRARY</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="popup">
        <form class="popup-content" novalidate>
            <span>Add book</span>
            <div class="Filed">
                <label for="Title">Title</label>
                <div class="kachao">
                <input type="text" id="Title" name="Title"  required>
                <span class="Title_error" aria-live="polite"></span>
                </div>
            </div>
            
            <div class="Filed"> 
                <label for="Author">Author</label>
                <div class="kachao">
                <input type="text" id="Author" name="Author"  required> 
                <span class="Author_error" aria-live="polite"></span>
                </div>
            </div>
          
            <div class="Filed">  
                <label for="Pages">Pages</label>
                <div class="kachao">
                 <input type="number" id="Pages" name="Pages" required>
                 <span class="Pages_error" aria-live="polite"></span>
                </div>
           </div>
            
            <div class="Filed">
                <label for="Read">Read ?</label>
                 <input type="checkbox" id="Read" > 
             </div>
           
            <div  class="submit-btn"><button type="submit" id="submit-book">Submit</button><button id="cancel" type="button">Cancel</button></div>
            
        </form>
    </div>
    <div class="header">
        <h1>Library</h1>
        <button id="new-book">
            <span>+</span>
            NEW BOOK
           </button>
    </div>
    <div class="shelf">
       
    </div>
</body>
</html>
